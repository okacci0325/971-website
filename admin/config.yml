backend:
  name: github
  repo: okacci0325/971-website
  branch: main
  base_url: https://971-oauth.okacci.workers.dev

media_folder: images/uploads
public_folder: /images/uploads

locale: ja

collections:
  - name: works
    label: Works（実績）
    files:
      - label: 実績リスト
        name: works_list
        file: content/works.json
        fields:
          - label: 実績
            name: items
            widget: list
            fields:
              - { label: タイトル, name: title, widget: string }
              - label: カテゴリ
                name: categories
                widget: list
                field: { label: カテゴリ, name: category, widget: string }
              - { label: サムネイル画像, name: image, widget: image, required: false, hint: "一覧に表示されるメイン画像" }
              - label: 詳細画像（複数可）
                name: images
                widget: list
                required: false
                field: { label: 画像, name: image, widget: image }
              - { label: 説明文, name: description, widget: text, required: false }
              - { label: 動画URL（YouTube）, name: video_url, widget: string, required: false, hint: "YouTubeのURL（例: https://youtu.be/xxxxx）" }
              - { label: 動画ファイル（直接アップロード）, name: video_file, widget: file, required: false, hint: "MP4などの動画ファイル。推奨：30秒以内・50MB以下（長尺はYouTube推奨）" }
              - { label: リンク先URL, name: url, widget: string, required: false, hint: "省略可（#でOK）" }
              - { label: 最初から表示する, name: featured, widget: boolean, default: true, hint: "falseにすると「More」ボタンで展開" }
              - { label: 公開する, name: published, widget: boolean, default: true, hint: "falseにするとサイトに表示されません" }

  - name: settings
    label: サイト設定
    files:
      - label: サイト設定・マーキーコピー
        name: marquee
        file: content/settings.json
        fields:
          - label: Worksセクションを表示する
            name: show_works
            widget: boolean
            default: true
          - label: Worksフィルタータグ（表示・順番を制御）
            name: filter_tags
            widget: list
            required: false
            hint: "表示したいタグ名をここに追加。順番もここで制御できます。空欄の場合はすべてのタグを自動表示"
            field: { label: タグ名, name: tag, widget: string }
          - label: マーキー1行目（左流れ）
            name: marquee1
            widget: list
            field: { label: テキスト, name: text, widget: string }
          - label: マーキー2行目（右流れ）
            name: marquee2
            widget: list
            field: { label: テキスト, name: text, widget: string }
          - label: マーキー3行目（左流れ）
            name: marquee3
            widget: list
            field: { label: テキスト, name: text, widget: string }

  - name: partners
    label: Partner（パートナー）
    files:
      - label: パートナーリスト
        name: partners_list
        file: content/partners.json
        fields:
          - label: パートナー
            name: items
            widget: list
            fields:
              - { label: 名前, name: name, widget: string }
              - { label: 肩書き／所属, name: title, widget: string, required: false }
              - { label: 写真, name: photo, widget: image, required: false }
              - { label: 詳細プロフィール, name: bio, widget: text, required: false }
              - label: 案件画像（複数可）
                name: images
                widget: list
                required: false
                field: { label: 画像, name: image, widget: image }
              - { label: 動画URL（YouTube）, name: video_url, widget: string, required: false, hint: "YouTubeのURL（例: https://youtu.be/xxxxx）" }
              - { label: 動画ファイル（直接アップロード）, name: video_file, widget: file, required: false }
              - { label: 公開する, name: published, widget: boolean, default: true }

  - name: news
    label: News（お知らせ）
    files:
      - label: お知らせリスト
        name: news_list
        file: content/news.json
        fields:
          - label: お知らせ
            name: items
            widget: list
            fields:
              - { label: 日付, name: date, widget: string, hint: "例: 2025.12.01" }
              - label: カテゴリ
                name: category
                widget: select
                options: ["Award", "Seminar", "Media", "News", "Other"]
              - { label: タイトル, name: title, widget: string }
              - { label: 本文, name: body, widget: text, required: false }
              - { label: リンク先URL, name: url, widget: string, required: false }
