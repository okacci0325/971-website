backend:
  name: github
  repo: okacci0325/971-website
  branch: main
  base_url: https://971-oauth.okacci.workers.dev

media_folder: images/uploads
public_folder: /images/uploads

locale: ja

collections:
  - name: works
    label: Works（実績）
    files:
      - label: 実績リスト
        name: works_list
        file: content/works.json
        fields:
          - label: 実績
            name: items
            widget: list
            fields:
              - { label: タイトル, name: title, widget: string }
              - label: カテゴリ
                name: categories
                widget: list
                field: { label: カテゴリ, name: category, widget: string }
              - { label: サムネイル画像, name: image, widget: image, required: false, hint: "一覧に表示されるメイン画像" }
              - label: 詳細画像（複数可）
                name: images
                widget: list
                required: false
                field: { label: 画像, name: image, widget: image }
              - { label: 説明文, name: description, widget: text, required: false }
              - { label: 動画URL, name: video_url, widget: string, required: false, hint: "YouTubeのURL（例: https://youtu.be/xxxxx）または動画ファイルのURL" }
              - { label: リンク先URL, name: url, widget: string, required: false, hint: "省略可（#でOK）" }
              - { label: 最初から表示する, name: featured, widget: boolean, default: true, hint: "falseにすると「More」ボタンで展開" }

  - name: settings
    label: サイト設定
    files:
      - label: マーキーコピー
        name: marquee
        file: content/settings.json
        fields:
          - label: マーキー1行目（左流れ）
            name: marquee1
            widget: list
            field: { label: テキスト, name: text, widget: string }
          - label: マーキー2行目（右流れ）
            name: marquee2
            widget: list
            field: { label: テキスト, name: text, widget: string }
          - label: マーキー3行目（左流れ）
            name: marquee3
            widget: list
            field: { label: テキスト, name: text, widget: string }

  - name: news
    label: News（お知らせ）
    files:
      - label: お知らせリスト
        name: news_list
        file: content/news.json
        fields:
          - label: お知らせ
            name: items
            widget: list
            fields:
              - { label: 日付, name: date, widget: string, hint: "例: 2025.12.01" }
              - label: カテゴリ
                name: category
                widget: select
                options: ["Award", "Seminar", "Media", "News", "Other"]
              - { label: タイトル, name: title, widget: string }
              - { label: 本文, name: body, widget: text, required: false }
              - { label: リンク先URL, name: url, widget: string, required: false }
