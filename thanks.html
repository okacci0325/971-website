<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>送信完了 | 971</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho+B1:wght@400;500&family=Inter:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Shippori Mincho B1', serif;
      background: #0B1F48;
      color: #fff;
      min-height: 100svh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 32px;
      text-align: center;
      padding: 40px 24px;
    }
    .logo img { height: 64px; }
    h1 { font-size: clamp(20px, 3vw, 28px); font-weight: 500; letter-spacing: 0.15em; line-height: 1.8; }
    p { font-size: 14px; color: rgba(255,255,255,0.55); letter-spacing: 0.1em; line-height: 2; }
    a {
      display: inline-block;
      margin-top: 16px;
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.5);
      text-decoration: none;
      border-bottom: 1px solid rgba(255,255,255,0.2);
      padding-bottom: 2px;
      transition: color 0.2s, border-color 0.2s;
    }
    a:hover { color: #fff; border-color: rgba(255,255,255,0.6); }
  </style>
</head>
<body>
  <div class="logo"><img src="/images/logo_white.png" alt="971" /></div>
  <div>
    <h1>お問い合わせありがとうございます。</h1>
    <p>内容を確認のうえ、通常2〜3営業日以内にご返信いたします。</p>
    <a href="/">← トップページへ戻る</a>
  </div>
</body>
</html>
